{% extends "base.html" %}

{% block title %}コメントを作成{% endblock title %}

    {% block contents %}
    <br>
    <div class="container">
        <div class="row">
            <div class="col offset-2">
                <form method="POST">
                    {% csrf_token %}
                    <table>  
                        <tr>
                            <th>コメント</th>
                            <td>{{ form.text }}</td>
                        </tr>
                    </table>
                    <hr>
                    <button type="submit">投稿する</button>
                </form>
            </div>
        </div>
    </div>
    {% endblock contents %}
